on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install front-end dependencies
      run: npm install
      working-directory: ./

    - name: Install back-end dependencies
      run: npm install
      working-directory: ./service-api

    - name: Run jest tests
      run: npm test
      working-directory: ./service-api
